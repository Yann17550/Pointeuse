<html lang="fr"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PointageGPS</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=Syne:wght@400;600;800&amp;display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">📍</div>
      <h1>Pointage<span>GPS</span></h1>
    </div>
    <div class="live-clock">
      <div class="time" id="clockTime">18:47:48</div>
      <div id="clockDate">Mer 06/Mai/2026</div>
    </div>
  </header>

  <!-- STATUS CARD -->
  <div class="status-card" id="statusCard">
    <div class="status-label">Statut actuel</div>
    <div class="status-main">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">Hors service</div>
    </div>
    <div class="timer-display" id="timerDisplay">00:00:08</div>
    <div class="location-info" id="locationInfo">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" color="#6b6b8a">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle>
      </svg>
      <div class="location-text" id="locationText">Position GPS non acquise</div>
    </div>
  </div>

  <!-- ACTION BUTTONS -->
  <div class="action-grid">
    <button class="btn btn-arrive" id="btnArrive" onclick="handleArrive(event)"><div class="btn-icon">🟢</div><span>Arrivée</span></button>
    <button class="btn btn-depart" id="btnDepart" onclick="handleDepart(event)" disabled=""><div class="btn-icon">🔴</div><span>Départ</span></button>
  </div>

  <!-- STATS -->
  <div class="section-header">
    <div class="section-title">Cette semaine</div>
  </div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="statDays">1</div>
      <div class="stat-label">Jours</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statHours">0min</div>
      <div class="stat-label">Heures</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statAvg">0min</div>
      <div class="stat-label">Moy/jour</div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="section-header">
    <div class="section-title">Historique</div>
    <div class="badge" id="historyCount">1 entrée</div>
  </div>
  <div class="history-list" id="historyList">
      <div class="history-item">
        <div class="history-date">
          <div class="history-day">06</div>
          <div class="history-month">Mai</div>
        </div>
        <div class="history-times">
          <div class="time-row">
            <span class="time-tag tag-arrive">Arrivée</span>
            <span class="time-value">17:59</span>
          </div>
          <div class="time-row">
            <span class="time-tag tag-depart">Départ</span>
            <span class="time-value">17:59</span>
          </div>
          <div style="font-size:10px;color:var(--muted);margin-top:4px;font-family:'Space Mono',monospace">Rue Félon, Saint-Denis-d'Oléron</div>
        </div>
        <div class="history-duration">
          <div class="duration-value">0min</div>
          <div class="duration-label">durée</div>
        </div>
      </div></div>

  <!-- EXPORT -->
  <button class="btn-export" onclick="exportCSV()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line>
    </svg>
    Exporter en CSV
  </button>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="script.js"></script>


</body></html>
