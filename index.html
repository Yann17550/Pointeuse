<html lang="fr"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PointageGPS</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=Syne:wght@400;600;800&amp;display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a40;
    --accent: #00e5a0;
    --accent2: #ff4d6a;
    --accent3: #7b6cff;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(123,108,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-top: 8px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px rgba(0,229,160,0.3);
  }

  .logo h1 {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  .live-clock {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: right;
    line-height: 1.6;
  }

  .live-clock .time {
    font-size: 16px;
    color: var(--text);
    font-weight: 700;
  }

  /* STATUS CARD */
  .status-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.4s;
  }

  .status-card.active-shift {
    border-color: rgba(0,229,160,0.4);
    box-shadow: 0 0 30px rgba(0,229,160,0.08);
  }

  .status-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent3), var(--accent));
    opacity: 0;
    transition: opacity 0.4s;
  }

  .status-card.active-shift::before { opacity: 1; }

  .status-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .status-main {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .status-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.4s;
    position: relative;
  }

  .status-dot.active {
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }

  .status-dot.active::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(2); }
  }

  .status-text {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .timer-display {
    font-family: 'Space Mono', monospace;
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 8px;
    display: none;
  }

  .timer-display.visible { display: block; }

  .location-info {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    background: var(--surface);
    border-radius: 10px;
    padding: 10px 14px;
    margin-top: 12px;
  }

  .location-info svg { flex-shrink: 0; margin-top: 2px; }

  .location-text {
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    line-height: 1.6;
  }

  .location-text strong { color: var(--text); font-size: 13px; }

  /* ACTION BUTTONS */
  .action-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .btn {
    border: none;
    border-radius: var(--radius);
    padding: 20px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
    letter-spacing: 0.5px;
  }

  .btn:active { transform: scale(0.96); }

  .btn-icon {
    font-size: 28px;
    line-height: 1;
  }

  .btn-arrive {
    background: linear-gradient(135deg, rgba(0,229,160,0.15), rgba(0,229,160,0.05));
    border: 1px solid rgba(0,229,160,0.4);
    color: var(--accent);
  }

  .btn-arrive:hover { background: linear-gradient(135deg, rgba(0,229,160,0.25), rgba(0,229,160,0.1)); }
  .btn-arrive:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-depart {
    background: linear-gradient(135deg, rgba(255,77,106,0.15), rgba(255,77,106,0.05));
    border: 1px solid rgba(255,77,106,0.4);
    color: var(--accent2);
  }

  .btn-depart:hover { background: linear-gradient(135deg, rgba(255,77,106,0.25), rgba(255,77,106,0.1)); }
  .btn-depart:disabled { opacity: 0.3; cursor: not-allowed; }

  /* SECTIONS */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
  }

  /* HISTORY LIST */
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .history-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .history-date {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--surface);
    border-radius: 8px;
    padding: 8px 10px;
    min-width: 50px;
  }

  .history-day {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .history-month {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }

  .history-times {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .time-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }

  .time-tag {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    min-width: 42px;
    text-align: center;
  }

  .tag-arrive { background: rgba(0,229,160,0.15); color: var(--accent); }
  .tag-depart { background: rgba(255,77,106,0.15); color: var(--accent2); }

  .time-value {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--text);
  }

  .history-duration {
    text-align: right;
  }

  .duration-value {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    color: var(--accent3);
  }

  .duration-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 12px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* EXPORT BTN */
  .btn-export {
    width: 100%;
    background: linear-gradient(135deg, rgba(123,108,255,0.15), rgba(123,108,255,0.05));
    border: 1px solid rgba(123,108,255,0.4);
    color: var(--accent3);
    border-radius: var(--radius);
    padding: 16px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .btn-export:hover { background: linear-gradient(135deg, rgba(123,108,255,0.25), rgba(123,108,255,0.1)); }
  .btn-export:active { transform: scale(0.98); }

  /* TOAST */
  .toast-container {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: calc(100% - 32px);
    max-width: 448px;
  }

  .toast {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes toastOut {
    from { opacity: 1; transform: translateY(0); }
    to { opacity: 0; transform: translateY(20px); }
  }

  .toast.success { border-color: rgba(0,229,160,0.4); }
  .toast.error { border-color: rgba(255,77,106,0.4); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }

  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* LOADING SPINNER */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: currentColor;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Ripple effect */
  .ripple {
    position: absolute;
    border-radius: 50%;
    transform: scale(0);
    animation: ripple 0.6s linear;
    background: rgba(255,255,255,0.15);
    pointer-events: none;
  }

  @keyframes ripple {
    to { transform: scale(4); opacity: 0; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">📍</div>
      <h1>Pointage<span>GPS</span></h1>
    </div>
    <div class="live-clock">
      <div class="time" id="clockTime">18:47:48</div>
      <div id="clockDate">Mer 06/Mai/2026</div>
    </div>
  </header>

  <!-- STATUS CARD -->
  <div class="status-card" id="statusCard">
    <div class="status-label">Statut actuel</div>
    <div class="status-main">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">Hors service</div>
    </div>
    <div class="timer-display" id="timerDisplay">00:00:08</div>
    <div class="location-info" id="locationInfo">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" color="#6b6b8a">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle>
      </svg>
      <div class="location-text" id="locationText">Position GPS non acquise</div>
    </div>
  </div>

  <!-- ACTION BUTTONS -->
  <div class="action-grid">
    <button class="btn btn-arrive" id="btnArrive" onclick="handleArrive(event)"><div class="btn-icon">🟢</div><span>Arrivée</span></button>
    <button class="btn btn-depart" id="btnDepart" onclick="handleDepart(event)" disabled=""><div class="btn-icon">🔴</div><span>Départ</span></button>
  </div>

  <!-- STATS -->
  <div class="section-header">
    <div class="section-title">Cette semaine</div>
  </div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="statDays">1</div>
      <div class="stat-label">Jours</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statHours">0min</div>
      <div class="stat-label">Heures</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statAvg">0min</div>
      <div class="stat-label">Moy/jour</div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="section-header">
    <div class="section-title">Historique</div>
    <div class="badge" id="historyCount">1 entrée</div>
  </div>
  <div class="history-list" id="historyList">
      <div class="history-item">
        <div class="history-date">
          <div class="history-day">06</div>
          <div class="history-month">Mai</div>
        </div>
        <div class="history-times">
          <div class="time-row">
            <span class="time-tag tag-arrive">Arrivée</span>
            <span class="time-value">17:59</span>
          </div>
          <div class="time-row">
            <span class="time-tag tag-depart">Départ</span>
            <span class="time-value">17:59</span>
          </div>
          <div style="font-size:10px;color:var(--muted);margin-top:4px;font-family:'Space Mono',monospace">Rue Félon, Saint-Denis-d'Oléron</div>
        </div>
        <div class="history-duration">
          <div class="duration-value">0min</div>
          <div class="duration-label">durée</div>
        </div>
      </div></div>

  <!-- EXPORT -->
  <button class="btn-export" onclick="exportCSV()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line>
    </svg>
    Exporter en CSV
  </button>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="script.js"></script>


</body></html>
